{{- define "content" -}}

{{/* Breadcrumbs under header, above page content (non-home pages only). */}}
{{ if not .IsHome }}
    {{ partial "breadcrumbs.html" . }}
{{ end }}

{{ if .Content }}
    <div class="content-margin">
        {{- partial "content.html" (dict "ctx" . "content" .Content) -}}
    </div>
{{ end }}

{{- end -}}
